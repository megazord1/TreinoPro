<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MotoExpress - Premium Edition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-body: #09090b;
            --bg-card: #18181b;
            --accent: #a855f7;
            --success: #10b981;
            --text: #f4f4f5;
            --border: rgba(168, 85, 247, 0.2);
        }

        body {
            background-color: var(--bg-body);
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        .glass-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.6);
        }

        .role-badge {
            font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.2px; font-weight: 800;
            padding: 5px 14px; border-radius: 50px; display: inline-block; margin-bottom: 8px;
        }

        .role-cliente { background: rgba(168, 85, 247, 0.15); color: #c084fc; border: 1px solid rgba(168, 85, 247, 0.4); }
        .role-motoboy { background: rgba(16, 185, 129, 0.15); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.4); }

        .form-control, .form-select {
            background: #27272a !important; border: 1px solid #3f3f46 !important;
            color: #fff !important; border-radius: 10px; padding: 12px; margin-bottom: 12px;
        }

        .btn-accent {
            background: var(--accent); color: white; border: none; padding: 12px;
            border-radius: 10px; font-weight: 700; transition: 0.3s;
        }

        .btn-accent:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }

        #map { height: 280px; border-radius: 16px; border: 1px solid var(--border); margin-top: 15px; }
        .hidden { display: none !important; }

        /* Estilo dos Cards de Status */
        .status-card {
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 20px;
            animation: fadeIn 0.4s ease;
        }

        .status-waiting {
            background: rgba(168, 85, 247, 0.05);
            border: 1px dashed var(--accent);
        }

        .status-confirmed {
            background: linear-gradient(145deg, #064e3b, #18181b);
            border: 1px solid var(--success);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.15);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .job-label { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; color: #a855f7; display: block; margin-bottom: 2px; }
        
        .history-header { background: rgba(39, 39, 42, 0.5); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 14px; padding: 14px 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .history-title { font-size: 0.75rem; letter-spacing: 1.5px; font-weight: 800; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="authScreen" class="container py-5">
    <div class="glass-card mx-auto" style="max-width: 420px;">
        <div class="text-center mb-4">
            <i class="bi bi-lightning-charge-fill" style="font-size: 2.5rem; color: var(--accent);"></i>
            <h2 class="fw-bold mt-2 m-0">MotoExpress</h2>
            <p class="text-success small fw-bold">Entregas Rápidas e Seguras</p>
        </div>
        <div class="d-flex gap-2 mb-4 bg-dark p-1 rounded-3">
            <button class="btn btn-dark flex-grow-1 active" id="tabLogin" onclick="toggleAuth('login')">Entrar</button>
            <button class="btn btn-dark flex-grow-1" id="tabRegister" onclick="toggleAuth('register')">Cadastrar</button>
        </div>
        <div id="authFields">
            <div id="registerOnlyFields" class="hidden">
                <input type="text" id="userName" class="form-control" placeholder="Nome completo">
                <div class="row g-2">
                    <div class="col-4">
                        <select id="userUF" class="form-select" onchange="carregarCidades(this.value)">
                            <option value="" disabled selected>UF</option>
                            <option value="MG">MG</option><option value="SP">SP</option><option value="RJ">RJ</option>
                        </select>
                    </div>
                    <div class="col-8"><select id="userCidade" class="form-select"><option value="" disabled selected>Cidade</option></select></div>
                </div>
                <select id="userRole" class="form-select mb-3">
                    <option value="" disabled selected>Tipo de conta...</option>
                    <option value="cliente">👤 Cliente</option>
                    <option value="motoboy">🏍️ Motoboy</option>
                </select>
            </div>
            <input type="email" id="userEmail" class="form-control" placeholder="E-mail">
            <input type="password" id="userPass" class="form-control" placeholder="Senha">
            <button id="authBtn" class="btn-accent w-100 mt-2">ACESSAR SISTEMA</button>
        </div>
    </div>
</div>

<div id="mainDashboard" class="container py-3 hidden">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <span id="roleLabel"></span>
            <h5 id="userNameDisplay" class="fw-bold m-0 text-white">---</h5>
            <small id="cityDisplay" class="text-muted"></small>
        </div>
        <button id="logoutBtn" class="btn btn-sm btn-outline-danger">Sair</button>
    </div>

    <!-- ÁREA DO CLIENTE -->
    <div id="clientView" class="hidden">
        <div id="orderForm" class="glass-card mb-4">
            <h6 class="fw-bold mb-3 text-accent">Solicitar Nova Corrida</h6>
            <input type="text" id="pickupLoc" class="form-control" placeholder="Local de retirada">
            <input type="text" id="deliveryLoc" class="form-control" placeholder="Destino final">
            <button id="calcBtn" class="btn btn-outline-light w-100 mb-2">COTAR VALOR</button>
            <div id="priceDisplay" class="text-center hidden">
                <h3 class="text-success fw-bold">R$ <span id="finalPrice">0,00</span></h3>
                <button id="orderBtn" class="btn-accent w-100 mt-2">SOLICITAR AGORA</button>
            </div>
        </div>

        <!-- ONDE A MÁGICA DOS CARDS ACONTECE -->
        <div id="statusContainer"></div>
        <div id="mapContainer" class="hidden">
            <div id="map"></div>
        </div>
    </div>

    <!-- ÁREA DO MOTOBOY -->
    <div id="driverView" class="hidden">
        <div id="activeJobCard"></div>
        <div id="availableJobsList" class="mb-4"></div>
    </div>

    <!-- HISTÓRICO -->
    <div class="mt-4 pb-5">
        <div class="history-header" data-bs-toggle="collapse" data-bs-target="#historyCollapse">
            <span class="history-title"><i class="bi bi-clock-history me-2"></i>HISTÓRICO</span>
            <i class="bi bi-chevron-down text-muted"></i>
        </div>
        <div class="collapse" id="historyCollapse">
            <div id="historyList" class="pt-2"></div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, collection, addDoc, query, where, onSnapshot, updateDoc, serverTimestamp, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyBsnN_KrorIrJD3faVOxqFD3SfUILr7XUY", authDomain: "motoexpress-887ba.firebaseapp.com", projectId: "motoexpress-887ba", storageBucket: "motoexpress-887ba.appspot.com", messagingSenderId: "931221356023", appId: "1:931221356023:web:7f6f5e4d3c2b1a" };
    const app = initializeApp(firebaseConfig), auth = getAuth(app), db = getFirestore(app);
    let Lmap, Lmarker, userCity = "", userUF = "", mode = 'login';

    window.toggleAuth = (m) => { mode = m; document.getElementById('registerOnlyFields').classList.toggle('hidden', m === 'login'); };

    onAuthStateChanged(auth, async user => {
        if(user) {
            const userDoc = await getDoc(doc(db, "usuarios", user.uid));
            if(userDoc.exists()) {
                const data = userDoc.data(); userCity = data.cidade; userUF = data.uf;
                document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('mainDashboard').classList.remove('hidden');
                document.getElementById('userNameDisplay').innerText = data.nome;
                document.getElementById('cityDisplay').innerText = `${userCity} - ${userUF}`;
                
                if(data.tipo === 'cliente') {
                    document.getElementById('roleLabel').innerText = 'Área do Cliente';
                    document.getElementById('roleLabel').className = 'role-badge role-cliente';
                    document.getElementById('clientView').classList.remove('hidden');
                    startClientLogic(user.uid);
                } else {
                    document.getElementById('roleLabel').innerText = 'Área do Motoboy';
                    document.getElementById('roleLabel').className = 'role-badge role-motoboy';
                    document.getElementById('driverView').classList.remove('hidden');
                    startDriverLogic(userCity);
                }
            }
        }
    });

    // LÓGICA DO CLIENTE - RESTAURANDO OS CARDS DE STATUS
    function startClientLogic(uid) {
        onSnapshot(query(collection(db, "pedidos"), where("clienteId", "==", uid), orderBy("data", "desc"), limit(1)), snap => {
            const form = document.getElementById('orderForm');
            const container = document.getElementById('statusContainer');
            const mapArea = document.getElementById('mapContainer');

            if(snap.empty) {
                form.classList.remove('hidden');
                container.innerHTML = "";
                mapArea.classList.add('hidden');
                return;
            }

            const p = snap.docs[0].data();

            if(p.status === 'pendente') {
                form.classList.add('hidden');
                mapArea.classList.add('hidden');
                container.innerHTML = `
                    <div class="status-card status-waiting text-center">
                        <div class="spinner-border text-accent mb-3" role="status"></div>
                        <h6 class="fw-bold m-0">Aguardando Motoboy...</h6>
                        <p class="small text-muted mb-0">Buscando profissionais em ${p.cidadeOrigem}</p>
                    </div>
                `;
            } 
            else if(p.status === 'aceito') {
                form.classList.add('hidden');
                container.innerHTML = `
                    <div class="status-card status-confirmed">
                        <div class="d-flex align-items-center mb-3">
                            <div class="bg-success rounded-circle p-2 me-3"><i class="bi bi-check-lg text-white"></i></div>
                            <div>
                                <h6 class="m-0 fw-bold">Corrida Aceita!</h6>
                                <small class="text-success">O entregador está a caminho</small>
                            </div>
                        </div>
                        <div class="bg-dark p-3 rounded-3 border border-secondary">
                            <span class="job-label">Motoboy Responsável</span>
                            <div class="fw-bold fs-5 text-white">${p.motoboyNome}</div>
                        </div>
                    </div>
                `;
                mapArea.classList.remove('hidden');
                syncMap(p.motoboyId);
            } 
            else {
                form.classList.remove('hidden');
                container.innerHTML = "";
                mapArea.classList.add('hidden');
            }
        });
    }

    function startDriverLogic(minhaCidade) {
        if(navigator.geolocation) navigator.geolocation.watchPosition(pos => updateDoc(doc(db, "usuarios", auth.currentUser.uid), { lat: pos.coords.latitude, lng: pos.coords.longitude }));
        onSnapshot(query(collection(db, "pedidos"), where("status", "==", "pendente"), where("cidadeOrigem", "==", minhaCidade)), snap => {
            const list = document.getElementById('availableJobsList'); list.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                list.innerHTML += `<div class="glass-card mb-3"><h4 class="text-success fw-bold">R$ ${(p.valorTotal * 0.8).toFixed(2)}</h4><div class="mt-3"><span class="job-label">Retirada:</span><div class="text-white small mb-2">${p.pickupLoc}</div><span class="job-label">Destino:</span><div class="text-white small">${p.deliveryLoc}</div></div><button class="btn-accent w-100 mt-3" onclick="acceptJob('${d.id}')">ACEITAR CORRIDA</button></div>`;
            });
        });
        onSnapshot(query(collection(db, "pedidos"), where("motoboyId", "==", auth.currentUser.uid), where("status", "==", "aceito")), snap => {
            const ac = document.getElementById('activeJobCard');
            if(!snap.empty) ac.innerHTML = `<div class="glass-card border-success mb-4"><h6 class="text-success fw-bold">Entrega em Curso</h6><button class="btn btn-success w-100 mt-2" onclick="finishJob('${snap.docs[0].id}')">FINALIZAR E RECEBER</button></div>`;
            else ac.innerHTML = "";
        });
    }

    window.acceptJob = async id => {
        const u = await getDoc(doc(db, "usuarios", auth.currentUser.uid));
        updateDoc(doc(db, "pedidos", id), { status: 'aceito', motoboyId: auth.currentUser.uid, motoboyNome: u.data().nome });
    };

    window.finishJob = id => updateDoc(doc(db, "pedidos", id), { status: 'finalizado' });

    function syncMap(mId) {
        if(!Lmap) { Lmap = L.map('map').setView([-15, -47], 4); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(Lmap); Lmarker = L.marker([0,0]).addTo(Lmap); }
        onSnapshot(doc(db, "usuarios", mId), d => { if(d.exists() && d.data().lat) { Lmarker.setLatLng([d.data().lat, d.data().lng]); Lmap.setView([d.data().lat, d.data().lng], 16); } });
    }

    document.getElementById('calcBtn').addEventListener('click', () => { 
        window.tempPrice = (15 + Math.random() * 10).toFixed(2); 
        document.getElementById('finalPrice').innerText = window.tempPrice; 
        document.getElementById('priceDisplay').classList.remove('hidden'); 
    });

    document.getElementById('orderBtn').addEventListener('click', () => {
        addDoc(collection(db, "pedidos"), { pickupLoc: document.getElementById('pickupLoc').value, deliveryLoc: document.getElementById('deliveryLoc').value, cidadeOrigem: userCity, valorTotal: window.tempPrice, status: 'pendente', clienteId: auth.currentUser.uid, data: serverTimestamp() });
    });

    document.getElementById('authBtn').addEventListener('click', async () => {
        const email = document.getElementById('userEmail').value, pass = document.getElementById('userPass').value;
        if(mode === 'login') signInWithEmailAndPassword(auth, email, pass);
        else {
            const res = await createUserWithEmailAndPassword(auth, email, pass);
            await setDoc(doc(db, "usuarios", res.user.uid), { nome: document.getElementById('userName').value, tipo: document.getElementById('userRole').value, uf: document.getElementById('userUF').value, cidade: document.getElementById('userCidade').value });
        }
    });

    document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth).then(() => location.reload()));
</script>
</body>
</html>
