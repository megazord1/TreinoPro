<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MotoExpress - Premium Edition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-body: #09090b;
            --bg-card: #18181b;
            --accent: #a855f7;
            --success: #10b981;
            --text: #f4f4f5;
            --border: rgba(168, 85, 247, 0.2);
        }

        body {
            background-color: var(--bg-body);
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        .glass-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.6);
        }

        .role-badge {
            font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.2px; font-weight: 800;
            padding: 5px 14px; border-radius: 50px; display: inline-block; margin-bottom: 8px;
        }

        .role-cliente { background: rgba(168, 85, 247, 0.15); color: #c084fc; border: 1px solid rgba(168, 85, 247, 0.4); }
        .role-motoboy { background: rgba(16, 185, 129, 0.15); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.4); }

        .form-control, .form-select {
            background: #27272a !important; border: 1px solid #3f3f46 !important;
            color: #fff !important; border-radius: 10px; padding: 12px; margin-bottom: 12px;
        }

        ::placeholder { color: #a1a1aa !important; opacity: 1; }

        .btn-accent {
            background: var(--accent); color: white; border: none; padding: 12px;
            border-radius: 10px; font-weight: 700; transition: 0.3s;
        }

        .btn-accent:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
        .btn-accent:disabled { background: #3f3f46; cursor: not-allowed; opacity: 0.7; }

        /* CHAT */
        .chat-container {
            background: #09090b; height: 250px; overflow-y: auto; display: flex; flex-direction: column;
            gap: 10px; padding: 15px; border-radius: 12px; border: 1px solid #27272a;
        }
        .bubble { padding: 10px 14px; border-radius: 15px; max-width: 85%; font-size: 0.9rem; }
        .bubble-me { background: var(--accent); align-self: flex-end; border-bottom-right-radius: 2px; }
        .bubble-other { background: #27272a; align-self: flex-start; border-bottom-left-radius: 2px; }

        #map { height: 280px; border-radius: 16px; border: 1px solid var(--border); margin-top: 15px; }
        .hidden { display: none !important; }

        /* CARDS DO MOTOBOY */
        .job-card { border-left: 4px solid var(--success); }
        .job-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: #71717a; margin-bottom: 2px; display: block; }
        .job-value-text { color: #e4e4e7; font-size: 0.95rem; font-weight: 500; display: block; margin-bottom: 8px; }

        /* ANIMAÇÃO DE BUSCA CLIENTE */
        .pulse-search {
            animation: pulse-border 2s infinite;
            border: 1px solid var(--accent);
        }
        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 rgba(168, 85, 247, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(168, 85, 247, 0); }
            100% { box-shadow: 0 0 0 0 rgba(168, 85, 247, 0); }
        }

        .history-item {
            background: #18181b; border-radius: 12px; padding: 12px; margin-top: 10px;
            border: 1px solid #27272a; border-left: 4px solid #444;
        }
        .history-item.finalizado { border-left-color: var(--success); }
    </style>
</head>
<body>

<div id="authScreen" class="container py-5">
    <div class="glass-card mx-auto" style="max-width: 420px;">
        <div class="text-center mb-4">
            <i class="bi bi-lightning-charge-fill" style="font-size: 2.5rem; color: var(--accent);"></i>
            <h2 class="fw-bold mt-2">MotoExpress</h2>
        </div>
        <div class="d-flex gap-2 mb-4 bg-dark p-1 rounded-3">
            <button class="btn btn-dark flex-grow-1 active" id="tabLogin" onclick="toggleAuth('login')">Entrar</button>
            <button class="btn btn-dark flex-grow-1" id="tabRegister" onclick="toggleAuth('register')">Cadastrar</button>
        </div>
        <div id="authFields">
            <div id="registerOnlyFields" class="hidden">
                <input type="text" id="userName" class="form-control" placeholder="Nome completo">
                <select id="userRole" class="form-select mb-3">
                    <option value="" disabled selected>Tipo de conta...</option>
                    <option value="cliente">👤 Cliente</option>
                    <option value="motoboy">🏍️ Motoboy</option>
                </select>
            </div>
            <input type="email" id="userEmail" class="form-control" placeholder="E-mail">
            <input type="password" id="userPass" class="form-control" placeholder="Senha">
            <button id="authBtn" class="btn-accent w-100 mt-2">ACESSAR SISTEMA</button>
        </div>
    </div>
</div>

<div id="mainDashboard" class="container py-3 hidden">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <span id="roleLabel"></span>
            <h5 id="userNameDisplay" class="fw-bold m-0 text-white">---</h5>
        </div>
        <button id="logoutBtn" class="btn btn-sm btn-outline-danger">Sair</button>
    </div>

    <div id="clientView" class="hidden">
        <div id="orderForm" class="glass-card mb-4">
            <h6 class="fw-bold mb-3 text-accent">Solicitar Corrida</h6>
            <input type="text" id="pickupLoc" class="form-control" placeholder="Local de retirada">
            <input type="text" id="deliveryLoc" class="form-control" placeholder="Destino final">
            <button id="calcBtn" class="btn btn-outline-light w-100 mb-2">COTAR VALOR</button>
            <div id="priceDisplay" class="text-center hidden">
                <h3 class="text-success fw-bold">R$ <span id="finalPrice">0,00</span></h3>
                <button id="orderBtn" class="btn-accent w-100 mt-2">SOLICITAR AGORA</button>
            </div>
        </div>
        <div id="clientStatusArea"></div>
        <div id="trackingArea" class="hidden">
            <div class="glass-card mb-3 border-success">
                <p class="small text-muted mb-2">Motoboy: <b id="driverNameDisplay" class="text-white">---</b></p>
                <div id="clientChatBox" class="chat-container mb-2"></div>
                <div class="input-group">
                    <input type="text" id="clientMsgInput" class="form-control mb-0" placeholder="Mensagem...">
                    <button class="btn btn-accent" onclick="sendMessage('client')"><i class="bi bi-send"></i></button>
                </div>
            </div>
            <div id="map"></div>
        </div>
    </div>

    <div id="driverView" class="hidden">
        <div id="activeJobCard"></div>
        <div id="driverChatArea" class="glass-card mb-4 hidden">
            <div id="driverChatBox" class="chat-container mb-2"></div>
            <div class="input-group">
                <input type="text" id="driverMsgInput" class="form-control mb-0" placeholder="Falar com cliente...">
                <button class="btn btn-accent" onclick="sendMessage('driver')"><i class="bi bi-send"></i></button>
            </div>
        </div>
        <div id="availableJobsList" class="mb-4"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, collection, addDoc, query, where, onSnapshot, updateDoc, serverTimestamp, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBsnN_KrorIrJD3faVOxqFD3SfUILr7XUY",
        authDomain: "motoexpress-887ba.firebaseapp.com",
        projectId: "motoexpress-887ba",
        storageBucket: "motoexpress-887ba.appspot.com",
        messagingSenderId: "931221356023",
        appId: "1:931221356023:web:7f6f5e4d3c2b1a"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentOrder = null, mode = 'login', chatUnsub = null, Lmap, Lmarker;

    window.toggleAuth = (m) => {
        mode = m;
        document.getElementById('registerOnlyFields').classList.toggle('hidden', m === 'login');
        document.getElementById('authBtn').innerText = m === 'login' ? 'ACESSAR SISTEMA' : 'CRIAR CONTA';
    };

    onAuthStateChanged(auth, async user => {
        if(user) {
            const userDoc = await getDoc(doc(db, "usuarios", user.uid));
            if(userDoc.exists()) {
                const data = userDoc.data();
                document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('mainDashboard').classList.remove('hidden');
                document.getElementById('userNameDisplay').innerText = data.nome;
                
                if(data.tipo === 'cliente') { 
                    document.getElementById('roleLabel').innerText = 'Área do Cliente';
                    document.getElementById('roleLabel').className = 'role-badge role-cliente';
                    document.getElementById('clientView').classList.remove('hidden'); 
                    startClientLogic(user.uid); 
                } else { 
                    document.getElementById('roleLabel').innerText = 'Área do Motoboy';
                    document.getElementById('roleLabel').className = 'role-badge role-motoboy';
                    document.getElementById('driverView').classList.remove('hidden'); 
                    startDriverLogic(); 
                }
            }
        }
    });

    function startClientLogic(uid) {
        onSnapshot(query(collection(db, "pedidos"), where("clienteId", "==", uid), orderBy("data", "desc"), limit(1)), snap => {
            const form = document.getElementById('orderForm'), track = document.getElementById('trackingArea'), statusDiv = document.getElementById('clientStatusArea');
            const btn = document.getElementById('orderBtn');

            if(snap.empty) { form.classList.remove('hidden'); return; }
            
            const p = snap.docs[0].data();
            currentOrder = snap.docs[0].id;

            if(p.status === 'pendente' || p.status === 'aceito') {
                form.classList.add('hidden');
                if(p.status === 'pendente') {
                    statusDiv.innerHTML = `<div class="glass-card pulse-search text-center">Aguardando motoboy...</div>`;
                } else {
                    statusDiv.innerHTML = `<div class="alert alert-success">Corrida aceita por ${p.motoboyNome}!</div>`;
                    document.getElementById('driverNameDisplay').innerText = p.motoboyNome;
                    track.classList.remove('hidden');
                    syncChat(currentOrder, 'clientChatBox');
                    if(p.motoboyId) syncMap(p.motoboyId);
                }
            } else {
                form.classList.remove('hidden'); track.classList.add('hidden'); statusDiv.innerHTML = "";
                btn.disabled = false; btn.innerText = "SOLICITAR AGORA";
            }
        });
    }

    function startDriverLogic() {
        if(navigator.geolocation) {
            navigator.geolocation.watchPosition(pos => {
                updateDoc(doc(db, "usuarios", auth.currentUser.uid), { lat: pos.coords.latitude, lng: pos.coords.longitude });
            }, null, { enableHighAccuracy: true });
        }
        onSnapshot(query(collection(db, "pedidos"), where("status", "==", "pendente")), snap => {
            const list = document.getElementById('availableJobsList'); list.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                list.innerHTML += `
                    <div class="glass-card job-card mb-3">
                        <h4 class="text-success fw-bold">R$ ${(p.valorTotal * 0.8).toFixed(2)}</h4>
                        <span class="job-label">Origem: <span class="text-white">${p.pickupLoc}</span></span>
                        <span class="job-label">Destino: <span class="text-white">${p.deliveryLoc}</span></span>
                        <button class="btn-accent w-100 mt-2" onclick="acceptJob('${d.id}')">ACEITAR</button>
                    </div>`;
            });
        });
        onSnapshot(query(collection(db, "pedidos"), where("motoboyId", "==", auth.currentUser.uid), where("status", "==", "aceito")), snap => {
            const activeCard = document.getElementById('activeJobCard'), driverChat = document.getElementById('driverChatArea');
            if(!snap.empty) {
                currentOrder = snap.docs[0].id; driverChat.classList.remove('hidden'); syncChat(currentOrder, 'driverChatBox');
                activeCard.innerHTML = `<div class="glass-card border-success mb-4"><button class="btn btn-success w-100" onclick="finishJob('${currentOrder}')">FINALIZAR</button></div>`;
            } else { driverChat.classList.add('hidden'); activeCard.innerHTML = ""; }
        });
    }

    document.getElementById('orderBtn').addEventListener('click', async () => {
        const btn = document.getElementById('orderBtn');
        btn.disabled = true;
        btn.innerHTML = `<span class="spinner-border spinner-border-sm"></span>...`;
        await addDoc(collection(db, "pedidos"), {
            pickupLoc: document.getElementById('pickupLoc').value,
            deliveryLoc: document.getElementById('deliveryLoc').value,
            valorTotal: window.tempPrice, status: 'pendente',
            clienteId: auth.currentUser.uid, data: serverTimestamp()
        });
    });

    document.getElementById('calcBtn').addEventListener('click', () => {
        const val = (15 + Math.random() * 10).toFixed(2);
        document.getElementById('finalPrice').innerText = val;
        document.getElementById('priceDisplay').classList.remove('hidden');
        window.tempPrice = val;
    });

    window.acceptJob = async id => {
        const u = await getDoc(doc(db, "usuarios", auth.currentUser.uid));
        updateDoc(doc(db, "pedidos", id), { status: 'aceito', motoboyId: auth.currentUser.uid, motoboyNome: u.data().nome });
    };

    window.finishJob = id => updateDoc(doc(db, "pedidos", id), { status: 'finalizado' });
    
    function syncChat(orderId, boxId) {
        if(chatUnsub) chatUnsub();
        chatUnsub = onSnapshot(query(collection(db, "pedidos", orderId, "chat"), orderBy("data", "asc")), snap => {
            const box = document.getElementById(boxId); let h = "";
            snap.forEach(m => { h += `<div class="bubble ${m.data().sId === auth.currentUser.uid ? 'bubble-me' : 'bubble-other'}">${m.data().t}</div>`; });
            box.innerHTML = h; box.scrollTo(0, box.scrollHeight);
        });
    }

    window.sendMessage = async (side) => {
        const inp = document.getElementById(side === 'client' ? 'clientMsgInput' : 'driverMsgInput');
        if(inp.value.trim() && currentOrder) {
            const txt = inp.value; inp.value = "";
            await addDoc(collection(db, "pedidos", currentOrder, "chat"), { t: txt, sId: auth.currentUser.uid, data: serverTimestamp() });
        }
    };

    function syncMap(mId) {
        if(!Lmap) {
            Lmap = L.map('map').setView([-15, -47], 4);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(Lmap);
            Lmarker = L.marker([0,0]).addTo(Lmap);
        }
        onSnapshot(doc(db, "usuarios", mId), d => { if(d.exists() && d.data().lat) { Lmarker.setLatLng([d.data().lat, d.data().lng]); Lmap.setView([d.data().lat, d.data().lng], 16); } });
    }

    document.getElementById('authBtn').addEventListener('click', async () => {
        const email = document.getElementById('userEmail').value, pass = document.getElementById('userPass').value;
        if(mode === 'login') signInWithEmailAndPassword(auth, email, pass);
        else {
            const nome = document.getElementById('userName').value, tipo = document.getElementById('userRole').value;
            const res = await createUserWithEmailAndPassword(auth, email, pass);
            await setDoc(doc(db, "usuarios", res.user.uid), { nome, tipo, email });
        }
    });
    document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth).then(() => location.reload()));
</script>
</body>
</html>
