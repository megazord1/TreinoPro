<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MotoExpress - Premium Edition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-body: #09090b;
            --bg-card: #18181b;
            --accent: #a855f7;
            --success: #10b981;
            --text: #f4f4f5;
            --border: rgba(168, 85, 247, 0.2);
        }

        body {
            background-color: var(--bg-body);
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        .glass-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.6);
        }

        .role-badge {
            font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.2px; font-weight: 800;
            padding: 5px 14px; border-radius: 50px; display: inline-block; margin-bottom: 8px;
        }

        .role-cliente { background: rgba(168, 85, 247, 0.15); color: #c084fc; border: 1px solid rgba(168, 85, 247, 0.4); }
        .role-motoboy { background: rgba(16, 185, 129, 0.15); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.4); }

        .form-control, .form-select {
            background: #27272a !important; border: 1px solid #3f3f46 !important;
            color: #fff !important; border-radius: 10px; padding: 12px; margin-bottom: 12px;
        }

        .btn-accent {
            background: var(--accent); color: white; border: none; padding: 12px;
            border-radius: 10px; font-weight: 700; transition: 0.3s;
        }

        .btn-accent:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }

        /* CHAT PREMIUM */
        .chat-container {
            background: #09090b; height: 200px; overflow-y: auto; display: flex; flex-direction: column;
            gap: 10px; padding: 15px; border-radius: 12px; border: 1px solid #27272a; margin-bottom: 10px;
        }
        .bubble { padding: 8px 12px; border-radius: 15px; max-width: 85%; font-size: 0.85rem; }
        .bubble-me { background: var(--accent); align-self: flex-end; border-bottom-right-radius: 2px; }
        .bubble-other { background: #27272a; align-self: flex-start; border-bottom-left-radius: 2px; }

        #map { height: 250px; border-radius: 16px; border: 1px solid var(--border); margin-top: 10px; }
        .hidden { display: none !important; }

        /* AUTOCOMPLETE */
        .autocomplete-suggestions {
            background: #18181b; border: 1px solid var(--border); border-radius: 12px;
            position: absolute; z-index: 9999; width: 100%; max-height: 200px; overflow-y: auto;
            box-shadow: 0 15px 30px rgba(0,0,0,0.8); margin-top: -10px;
        }
        .suggestion-item { padding: 10px 15px; cursor: pointer; font-size: 0.85rem; border-bottom: 1px solid #27272a; }
        .suggestion-item:hover { background: var(--accent); }

        /* STATUS CARD */
        .status-card-confirmed {
            background: rgba(16, 185, 129, 0.1); border: 1px solid var(--success);
            border-radius: 16px; padding: 15px; margin-bottom: 15px;
        }

        .job-label { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; color: #a855f7; display: block; margin-bottom: 2px; }
        .address-text { color: #fff; font-size: 0.85rem; margin-bottom: 10px; line-height: 1.3; }

        .history-item { background: #18181b; border-radius: 12px; padding: 12px; margin-top: 10px; border: 1px solid #27272a; border-left: 4px solid #444; }
    </style>
</head>
<body>

<div id="authScreen" class="container py-5">
    <div class="glass-card mx-auto" style="max-width: 400px;">
        <div class="text-center mb-4">
            <i class="bi bi-lightning-charge-fill" style="font-size: 2.5rem; color: var(--accent);"></i>
            <h2 class="fw-bold mt-2 m-0">MotoExpress</h2>
        </div>
        <div class="d-flex gap-2 mb-4 bg-dark p-1 rounded-3">
            <button class="btn btn-dark flex-grow-1 active" id="tabLogin" onclick="toggleAuth('login')">Entrar</button>
            <button class="btn btn-dark flex-grow-1" id="tabRegister" onclick="toggleAuth('register')">Cadastrar</button>
        </div>
        <div id="authFields">
            <div id="registerOnlyFields" class="hidden">
                <input type="text" id="userName" class="form-control" placeholder="Nome completo">
                <div class="row g-2">
                    <div class="col-4"><select id="userUF" class="form-select" onchange="carregarCidades(this.value)"><option value="" disabled selected>UF</option><option value="MG">MG</option><option value="SP">SP</option><option value="RJ">RJ</option></select></div>
                    <div class="col-8"><select id="userCidade" class="form-select"><option value="" disabled selected>Cidade</option></select></div>
                </div>
                <select id="userRole" class="form-select mb-3"><option value="" disabled selected>Tipo de conta...</option><option value="cliente">👤 Cliente</option><option value="motoboy">🏍️ Motoboy</option></select>
            </div>
            <input type="email" id="userEmail" class="form-control" placeholder="E-mail">
            <input type="password" id="userPass" class="form-control" placeholder="Senha">
            <button id="authBtn" class="btn-accent w-100 mt-2">ACESSAR SISTEMA</button>
        </div>
    </div>
</div>

<div id="mainDashboard" class="container py-3 hidden">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div><span id="roleLabel"></span><h5 id="userNameDisplay" class="fw-bold m-0">---</h5><small id="cityDisplay" class="text-muted"></small></div>
        <button id="logoutBtn" class="btn btn-sm btn-outline-danger">Sair</button>
    </div>

    <!-- VISÃO DO CLIENTE -->
    <div id="clientView" class="hidden">
        <div id="orderForm" class="glass-card mb-4">
            <h6 class="fw-bold mb-3 text-accent">Nova Corrida</h6>
            <div class="position-relative mb-3"><input type="text" id="pickupLoc" class="form-control mb-0" placeholder="Onde retirar?"><div id="pickupSuggestions" class="autocomplete-suggestions hidden"></div></div>
            <div class="position-relative mb-3"><input type="text" id="deliveryLoc" class="form-control mb-0" placeholder="Para onde levar?"><div id="deliverySuggestions" class="autocomplete-suggestions hidden"></div></div>
            <button id="calcBtn" class="btn btn-outline-light w-100 mb-2">COTAR VALOR</button>
            <div id="priceDisplay" class="text-center hidden"><h3 class="text-success fw-bold">R$ <span id="finalPrice">0,00</span></h3><button id="orderBtn" class="btn-accent w-100 mt-2">SOLICITAR AGORA</button></div>
        </div>

        <div id="clientStatusArea"></div>

        <div id="trackingArea" class="hidden">
            <div class="status-card-confirmed">
                <div class="d-flex align-items-center">
                    <div class="bg-success rounded-circle p-2 me-3"><i class="bi bi-check2-all text-white"></i></div>
                    <div><h6 class="m-0 fw-bold">Corrida Confirmada!</h6><small class="text-white-50">Motoboy: <b id="driverNameDisplay">---</b> está a caminho.</small></div>
                </div>
            </div>
            <div class="glass-card mb-3">
                <div id="clientChatBox" class="chat-container"></div>
                <div class="input-group"><input type="text" id="clientMsgInput" class="form-control mb-0" placeholder="Enviar mensagem..."><button class="btn btn-accent" onclick="sendMessage('client')"><i class="bi bi-send"></i></button></div>
            </div>
            <div id="map"></div>
        </div>
    </div>

    <!-- VISÃO DO MOTOBOY -->
    <div id="driverView" class="hidden">
        <div id="activeJobCard"></div>
        <div id="driverChatArea" class="glass-card mb-4 hidden">
            <div id="driverChatBox" class="chat-container"></div>
            <div class="input-group"><input type="text" id="driverMsgInput" class="form-control mb-0" placeholder="Falar com cliente..."><button class="btn btn-accent" onclick="sendMessage('driver')"><i class="bi bi-send"></i></button></div>
        </div>
        <div id="availableJobsList"></div>
    </div>

    <div class="mt-4"><div class="history-header" data-bs-toggle="collapse" data-bs-target="#historyCollapse"><span class="history-title">HISTÓRICO</span><i class="bi bi-chevron-down"></i></div><div class="collapse" id="historyCollapse"><div id="historyList"></div></div></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, collection, addDoc, query, where, onSnapshot, updateDoc, serverTimestamp, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyBsnN_KrorIrJD3faVOxqFD3SfUILr7XUY", authDomain: "motoexpress-887ba.firebaseapp.com", projectId: "motoexpress-887ba", storageBucket: "motoexpress-887ba.appspot.com", messagingSenderId: "931221356023", appId: "1:931221356023:web:7f6f5e4d3c2b1a" };
    const app = initializeApp(firebaseConfig), auth = getAuth(app), db = getFirestore(app);
    let currentOrder = null, chatUnsub = null, Lmap, Lmarker, userCity = "", userUF = "", mode = 'login';

    window.toggleAuth = (m) => { mode = m; document.getElementById('registerOnlyFields').classList.toggle('hidden', m === 'login'); };

    onAuthStateChanged(auth, async user => {
        if(user) {
            const userDoc = await getDoc(doc(db, "usuarios", user.uid));
            if(userDoc.exists()) {
                const data = userDoc.data(); userCity = data.cidade; userUF = data.uf;
                document.getElementById('authScreen').classList.add('hidden'); document.getElementById('mainDashboard').classList.remove('hidden');
                document.getElementById('userNameDisplay').innerText = data.nome;
                if(data.tipo === 'cliente') { 
                    document.getElementById('clientView').classList.remove('hidden'); 
                    startClientLogic(user.uid); 
                } else { 
                    document.getElementById('driverView').classList.remove('hidden'); 
                    startDriverLogic(userCity); 
                }
            }
        }
    });

    // LÓGICA DO CLIENTE (MONITORAMENTO EM TEMPO REAL)
    async function startClientLogic(uid) {
        onSnapshot(query(collection(db, "pedidos"), where("clienteId", "==", uid), orderBy("data", "desc"), limit(1)), snap => {
            const form = document.getElementById('orderForm'), track = document.getElementById('trackingArea'), statusDiv = document.getElementById('clientStatusArea');
            if(snap.empty) { form.classList.remove('hidden'); return; }
            
            const p = snap.docs[0].data();
            currentOrder = snap.docs[0].id;

            if(p.status === 'pendente') {
                form.classList.add('hidden');
                statusDiv.innerHTML = `<div class="glass-card text-center py-4"><div class="spinner-border text-accent mb-3"></div><br>Procurando motoboy em ${p.cidadeOrigem}...</div>`;
            } else if(p.status === 'aceito') {
                form.classList.add('hidden');
                statusDiv.classList.add('hidden'); // Esconde o "procurando"
                document.getElementById('driverNameDisplay').innerText = p.motoboyNome;
                track.classList.remove('hidden');
                syncChat(currentOrder, 'clientChatBox');
                if(p.motoboyId) syncMap(p.motoboyId);
            } else {
                form.classList.remove('hidden'); track.classList.add('hidden'); statusDiv.innerHTML = "";
            }
        });
    }

    // LÓGICA DO MOTOBOY
    function startDriverLogic(minhaCidade) {
        if(navigator.geolocation) navigator.geolocation.watchPosition(pos => updateDoc(doc(db, "usuarios", auth.currentUser.uid), { lat: pos.coords.latitude, lng: pos.coords.longitude }));
        
        onSnapshot(query(collection(db, "pedidos"), where("status", "==", "pendente"), where("cidadeOrigem", "==", minhaCidade)), snap => {
            const list = document.getElementById('availableJobsList'); list.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                list.innerHTML += `<div class="glass-card mb-3"><h4 class="text-success fw-bold">R$ ${(p.valorTotal * 0.8).toFixed(2)}</h4><div class="mt-2"><span class="job-label">Retirada:</span><div class="address-text">${p.pickupLoc}</div><span class="job-label">Entrega:</span><div class="address-text">${p.deliveryLoc}</div></div><button class="btn-accent w-100" onclick="acceptJob('${d.id}')">ACEITAR CORRIDA</button></div>`;
            });
        });

        onSnapshot(query(collection(db, "pedidos"), where("motoboyId", "==", auth.currentUser.uid), where("status", "==", "aceito")), snap => {
            const ac = document.getElementById('activeJobCard'), dc = document.getElementById('driverChatArea');
            if(!snap.empty) {
                currentOrder = snap.docs[0].id;
                dc.classList.remove('hidden'); syncChat(currentOrder, 'driverChatBox');
                ac.innerHTML = `<div class="glass-card border-success mb-4"><h6 class="text-success fw-bold">Corrida em andamento</h6><button class="btn btn-success w-100 mt-2" onclick="finishJob('${currentOrder}')">FINALIZAR ENTREGA</button></div>`;
            } else { dc.classList.add('hidden'); ac.innerHTML = ""; }
        });
    }

    // FUNÇÕES DE AÇÃO
    window.acceptJob = async id => {
        const u = await getDoc(doc(db, "usuarios", auth.currentUser.uid));
        updateDoc(doc(db, "pedidos", id), { status: 'aceito', motoboyId: auth.currentUser.uid, motoboyNome: u.data().nome });
    };

    window.finishJob = id => updateDoc(doc(db, "pedidos", id), { status: 'finalizado' });

    window.sendMessage = async side => {
        const inp = document.getElementById(side === 'client' ? 'clientMsgInput' : 'driverMsgInput');
        if(inp.value.trim() && currentOrder) {
            const txt = inp.value; inp.value = "";
            await addDoc(collection(db, "pedidos", currentOrder, "chat"), { t: txt, sId: auth.currentUser.uid, data: serverTimestamp() });
        }
    };

    function syncChat(orderId, boxId) {
        if(chatUnsub) chatUnsub();
        chatUnsub = onSnapshot(query(collection(db, "pedidos", orderId, "chat"), orderBy("data", "asc")), snap => {
            const box = document.getElementById(boxId); let h = "";
            snap.forEach(m => h += `<div class="bubble ${m.data().sId === auth.currentUser.uid ? 'bubble-me' : 'bubble-other'}">${m.data().t}</div>`);
            box.innerHTML = h; box.scrollTo(0, box.scrollHeight);
        });
    }

    function syncMap(mId) {
        if(!Lmap) { Lmap = L.map('map').setView([-15, -47], 4); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(Lmap); Lmarker = L.marker([0,0]).addTo(Lmap); }
        onSnapshot(doc(db, "usuarios", mId), d => { if(d.exists() && d.data().lat) { Lmarker.setLatLng([d.data().lat, d.data().lng]); Lmap.setView([d.data().lat, d.data().lng], 16); } });
    }

    document.getElementById('calcBtn').addEventListener('click', () => { 
        const val = (15 + Math.random() * 10).toFixed(2); 
        document.getElementById('finalPrice').innerText = val; 
        document.getElementById('priceDisplay').classList.remove('hidden'); 
        window.tempPrice = val; 
    });

    document.getElementById('orderBtn').addEventListener('click', async () => {
        await addDoc(collection(db, "pedidos"), { 
            pickupLoc: document.getElementById('pickupLoc').value, 
            deliveryLoc: document.getElementById('deliveryLoc').value, 
            cidadeOrigem: userCity, valorTotal: window.tempPrice, status: 'pendente', 
            clienteId: auth.currentUser.uid, data: serverTimestamp() 
        });
    });

    // SISTEMA DE AUTH (MANTIDO)
    document.getElementById('authBtn').addEventListener('click', async () => {
        const email = document.getElementById('userEmail').value, pass = document.getElementById('userPass').value;
        if(mode === 'login') signInWithEmailAndPassword(auth, email, pass);
        else {
            const res = await createUserWithEmailAndPassword(auth, email, pass);
            await setDoc(doc(db, "usuarios", res.user.uid), { 
                nome: document.getElementById('userName').value, 
                tipo: document.getElementById('userRole').value, 
                uf: document.getElementById('userUF').value, 
                cidade: document.getElementById('userCidade').value 
            });
        }
    });

    document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth).then(() => location.reload()));
</script>
</body>
</html>
