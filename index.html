<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MotoExpress - Premium Edition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-body: #09090b;
            --bg-card: #18181b;
            --accent: #a855f7; 
            --success: #10b981; 
            --text: #f4f4f5;
            --border: rgba(168, 85, 247, 0.2);
        }

        body { 
            background-color: var(--bg-body); 
            color: var(--text); 
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        .glass-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.6);
        }

        .form-control, .form-select {
            background: #27272a !important;
            border: 1px solid #3f3f46 !important;
            color: #fff !important;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .form-control::placeholder {
            color: #71717a !important;
            opacity: 1;
        }

        .btn-accent {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 700;
            transition: 0.3s;
        }

        .btn-accent:hover { opacity: 0.9; transform: translateY(-1px); }

        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            background: #09090b;
            padding: 5px;
            border-radius: 14px;
        }

        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: 0.3s;
            color: #71717a;
        }

        .auth-tab.active {
            background: var(--bg-card);
            color: var(--accent);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
        }

        .chat-container {
            background: #09090b;
            height: 250px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #27272a;
        }

        .bubble { padding: 10px 14px; border-radius: 15px; max-width: 85%; font-size: 0.9rem; }
        .bubble-me { background: var(--accent); align-self: flex-end; border-bottom-right-radius: 2px; }
        .bubble-other { background: #27272a; align-self: flex-start; border-bottom-left-radius: 2px; }

        #map { height: 280px; border-radius: 16px; border: 1px solid var(--border); margin-top: 15px; }
        .hidden { display: none !important; }

        .animate-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
    </style>
</head>
<body>

<div id="authScreen" class="container py-5">
    <div class="glass-card mx-auto" style="max-width: 420px;">
        <div class="text-center mb-4">
            <i class="bi bi-lightning-charge-fill" style="font-size: 2.5rem; color: var(--accent);"></i>
            <h2 class="fw-bold mt-2">MotoExpress</h2>
            <p style="color: #10b981; font-weight: 600;">Sua entrega começa aqui</p>
        </div>

        <div class="auth-tabs">
            <div class="auth-tab active" id="tabLogin" onclick="toggleAuth('login')">Entrar</div>
            <div class="auth-tab" id="tabRegister" onclick="toggleAuth('register')">Cadastrar</div>
        </div>

        <div id="authFields">
            <div id="registerOnlyFields" class="hidden">
                <input type="text" id="userName" class="form-control" placeholder="Nome Completo">
                <select id="userRole" class="form-select mb-3">
                    <option value="" disabled selected>Selecione o tipo de conta...</option>
                    <option value="cliente">&#128100; Cliente</option>
                    <option value="motoboy">&#127949; Motoboy</option>
                </select>
            </div>

            <input type="email" id="userEmail" class="form-control" placeholder="Digite seu email">
            <input type="password" id="userPass" class="form-control" placeholder="Digite sua senha">

            <button id="authBtn" class="btn-accent w-100 mt-2 shadow-sm">ACESSAR SISTEMA</button>
        </div>
    </div>
</div>

<div id="mainDashboard" class="container py-3 hidden">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <small class="text-muted d-block" id="roleLabel">Carregando...</small>
            <h5 id="userNameDisplay" class="fw-bold m-0 text-white">---</h5>
        </div>
        <button id="logoutBtn" class="btn btn-sm btn-outline-danger rounded-pill px-3">Sair</button>
    </div>

    <div id="clientView" class="hidden">
        <div id="orderForm" class="glass-card mb-4">
            <h6 class="fw-bold mb-3 text-accent">Nova Solicitação</h6>
            <input type="text" id="pickupLoc" class="form-control" placeholder="Local de retirada">
            <input type="text" id="deliveryLoc" class="form-control" placeholder="Destino final">
            <button id="calcBtn" class="btn btn-outline-light w-100 mb-3 mt-2">COTAR VALOR</button>
            <div id="priceDisplay" class="text-center hidden">
                <span class="text-muted d-block small">VALOR ESTIMADO</span>
                <h3 class="text-success fw-bold">R$ <span id="finalPrice">0,00</span></h3>
                <button id="orderBtn" class="btn-accent w-100 mt-2">CONFIRMAR PEDIDO</button>
            </div>
        </div>

        <div id="clientStatusArea"></div>

        <div id="trackingArea" class="hidden">
            <div class="glass-card mb-3">
                <div id="clientChatBox" class="chat-container mb-2"></div>
                <div class="input-group">
                    <input type="text" id="clientMsgInput" class="form-control mb-0" placeholder="Mensagem para o motoboy...">
                    <button class="btn btn-accent" onclick="sendMessage('client')"><i class="bi bi-send"></i></button>
                </div>
            </div>
            <div id="map"></div>
        </div>
    </div>

    <div id="driverView" class="hidden">
        <div id="activeJobCard"></div>
        <div id="driverChatArea" class="glass-card mb-4 hidden">
            <div id="driverChatBox" class="chat-container mb-2"></div>
            <div class="input-group">
                <input type="text" id="driverMsgInput" class="form-control mb-0" placeholder="Falar com cliente...">
                <button class="btn btn-accent" onclick="sendMessage('driver')"><i class="bi bi-send"></i></button>
            </div>
        </div>
        <div class="d-flex align-items-center mb-2 px-1">
            <div style="width: 8px; height: 8px; background: var(--success); border-radius: 50%; margin-right: 8px;"></div>
            <span class="small fw-bold text-muted">PEDIDOS DISPONÍVEIS</span>
        </div>
        <div id="availableJobsList"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, collection, addDoc, query, where, onSnapshot, updateDoc, serverTimestamp, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBsnN_KrorIrJD3faVOxqFD3SfUILr7XUY",
        authDomain: "motoexpress-887ba.firebaseapp.com",
        projectId: "motoexpress-887ba",
        storageBucket: "motoexpress-887ba.appspot.com",
        messagingSenderId: "931221356023",
        appId: "1:931221356023:web:7f6f5e4d3c2b1a"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentOrder = null, mode = 'login', chatUnsub = null, Lmap, Lmarker;

    window.toggleAuth = (m) => {
        mode = m;
        const emailInput = document.getElementById('userEmail');
        const passInput = document.getElementById('userPass');
        document.getElementById('tabLogin').classList.toggle('active', m === 'login');
        document.getElementById('tabRegister').classList.toggle('active', m === 'register');
        document.getElementById('registerOnlyFields').classList.toggle('hidden', m === 'login');
        
        if (m === 'login') {
            emailInput.placeholder = "Digite seu email";
            passInput.placeholder = "Digite sua senha";
            document.getElementById('authBtn').innerText = 'ACESSAR SISTEMA';
        } else {
            emailInput.placeholder = "Qual o seu melhor e-mail?";
            passInput.placeholder = "Crie uma senha forte";
            document.getElementById('authBtn').innerText = 'CRIAR CONTA AGORA';
        }
    };

    onAuthStateChanged(auth, async user => {
        if(user) {
            const userDoc = await getDoc(doc(db, "usuarios", user.uid));
            if(userDoc.exists()) {
                const data = userDoc.data();
                document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('mainDashboard').classList.remove('hidden');
                document.getElementById('userNameDisplay').innerText = data.nome;
                document.getElementById('roleLabel').innerText = data.tipo === 'cliente' ? 'Área do Cliente' : 'Área do Motoboy';
                if(data.tipo === 'cliente') { 
                    document.getElementById('clientView').classList.remove('hidden'); 
                    startClientLogic(user.uid); 
                } else { 
                    document.getElementById('driverView').classList.remove('hidden'); 
                    startDriverLogic(); 
                }
            }
        }
    });

    document.getElementById('authBtn').addEventListener('click', async () => {
        const email = document.getElementById('userEmail').value;
        const pass = document.getElementById('userPass').value;
        if(mode === 'login') {
            signInWithEmailAndPassword(auth, email, pass).catch(() => alert("Credenciais inválidas."));
        } else {
            const nome = document.getElementById('userName').value;
            const tipo = document.getElementById('userRole').value;
            if(!nome || !tipo || !email || !pass) return alert("Preencha todos os campos!");
            try {
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                await setDoc(doc(db, "usuarios", res.user.uid), { nome, tipo, email });
                location.reload();
            } catch (e) { alert("Erro no cadastro. Verifique os dados."); }
        }
    });

    function startClientLogic(uid) {
        onSnapshot(query(collection(db, "pedidos"), where("clienteId", "==", uid), orderBy("data", "desc"), limit(1)), snap => {
            const form = document.getElementById('orderForm');
            const track = document.getElementById('trackingArea');
            const statusDiv = document.getElementById('clientStatusArea');
            const priceDiv = document.getElementById('priceDisplay');

            if(snap.empty) { 
                form.classList.remove('hidden'); 
                track.classList.add('hidden');
                statusDiv.innerHTML = "";
                return; 
            }

            const p = snap.docs[0].data(); 
            currentOrder = snap.docs[0].id;

            if(p.status === 'finalizado') { 
                form.classList.remove('hidden'); 
                track.classList.add('hidden'); 
                statusDiv.innerHTML = ""; 
                priceDiv.classList.add('hidden');
            } else {
                form.classList.add('hidden');

                if(p.status === 'pendente') {
                    statusDiv.innerHTML = `
                        <div class="glass-card text-center mb-3 border-accent animate-pulse">
                            <div class="spinner-border spinner-border-sm text-accent me-2" role="status"></div>
                            <span class="fw-bold">Aguardando motoboy aceitar...</span>
                        </div>`;
                    track.classList.add('hidden');
                } 
                
                if(p.status === 'aceito') {
                    statusDiv.innerHTML = `
                        <div class="glass-card mb-3" style="border-left: 5px solid var(--success); background: #1a2e25;">
                            <div class="d-flex align-items-center">
                                <i class="bi bi-person-check-fill text-success fs-3 me-3"></i>
                                <div>
                                    <h6 class="m-0 fw-bold text-white">Solicitação Aceita!</h6>
                                    <p class="m-0 small text-success">O motoboy <b>${p.motoboyNome || 'Parceiro'}</b> está a caminho.</p>
                                </div>
                            </div>
                        </div>`;
                    
                    track.classList.remove('hidden'); 
                    syncChat(currentOrder, 'clientChatBox'); 
                    if(p.motoboyId) syncMap(p.motoboyId);
                }
            }
        });
    }

    function startDriverLogic() {
        if(navigator.geolocation) {
            navigator.geolocation.watchPosition(pos => {
                updateDoc(doc(db, "usuarios", auth.currentUser.uid), { 
                    lat: pos.coords.latitude, 
                    lng: pos.coords.longitude 
                }).catch(() => {});
            }, null, { enableHighAccuracy: true });
        }

        onSnapshot(query(collection(db, "pedidos"), where("status", "==", "pendente")), snap => {
            const list = document.getElementById('availableJobsList'); 
            list.innerHTML = "";
            snap.forEach(d => {
                const data = d.data();
                list.innerHTML += `
                    <div class="glass-card mb-2 border-0" style="background: #27272a;">
                        <div class="d-flex justify-content-between align-items-center">
                            <b class="text-success">R$ ${(data.valorTotal * 0.8).toFixed(2)}</b>
                        </div>
                        <small class="text-muted d-block mt-1"><b>Para:</b> ${data.deliveryLoc}</small>
                        <button class="btn-accent w-100 mt-2 py-1" onclick="acceptJob('${d.id}')">ACEITAR CORRIDA</button>
                    </div>`;
            });
        });

        onSnapshot(query(collection(db, "pedidos"), where("motoboyId", "==", auth.currentUser.uid), where("status", "==", "aceito")), snap => {
            const activeCard = document.getElementById('activeJobCard'); 
            const driverChat = document.getElementById('driverChatArea');
            activeCard.innerHTML = "";
            
            if(!snap.empty) {
                currentOrder = snap.docs[0].id;
                driverChat.classList.remove('hidden');
                syncChat(currentOrder, 'driverChatBox');
                activeCard.innerHTML = `
                    <div class="glass-card border-success mb-4 text-center">
                        <button class="btn btn-success w-100 fw-bold" onclick="finishJob('${currentOrder}')">CONCLUIR ENTREGA</button>
                    </div>`;
            } else { driverChat.classList.add('hidden'); }
        });
    }

    function syncChat(orderId, boxId) {
        if(chatUnsub) chatUnsub();
        const chatRef = collection(db, "pedidos", orderId, "chat");
        chatUnsub = onSnapshot(query(chatRef, orderBy("data", "asc")), snap => {
            const box = document.getElementById(boxId); 
            let h = "";
            snap.forEach(m => { 
                const isMe = m.data().sId === auth.currentUser.uid;
                h += `<div class="bubble ${isMe ? 'bubble-me' : 'bubble-other'}">${m.data().t}</div>`; 
            });
            box.innerHTML = h; 
            box.scrollTo(0, box.scrollHeight);
        });
    }

    window.sendMessage = async (side) => {
        const inp = document.getElementById(side === 'client' ? 'clientMsgInput' : 'driverMsgInput');
        if(inp.value.trim() && currentOrder) {
            const txt = inp.value; 
            inp.value = "";
            await addDoc(collection(db, "pedidos", currentOrder, "chat"), { 
                t: txt, 
                sId: auth.currentUser.uid, 
                data: serverTimestamp() 
            });
        }
    };

    function syncMap(mId) {
        if(!Lmap) {
            Lmap = L.map('map').setView([-15, -47], 4);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(Lmap);
            Lmarker = L.marker([0,0]).addTo(Lmap);
        }
        onSnapshot(doc(db, "usuarios", mId), d => { 
            if(d.exists() && d.data().lat) { 
                const pos = [d.data().lat, d.data().lng];
                Lmarker.setLatLng(pos); 
                Lmap.setView(pos, 16); 
            } 
        });
    }

    document.getElementById('calcBtn').addEventListener('click', () => {
        const pLoc = document.getElementById('pickupLoc').value;
        const dLoc = document.getElementById('deliveryLoc').value;
        if (pLoc.length < 3 || dLoc.length < 3) return alert("Digite endereços válidos.");
        const base = 12.00;
        const valorFinal = (base + (pLoc.length + dLoc.length) * 0.15 + Math.random() * 3).toFixed(2);
        document.getElementById('finalPrice').innerText = valorFinal;
        document.getElementById('priceDisplay').classList.remove('hidden');
        window.tempPrice = parseFloat(valorFinal);
    });

    document.getElementById('orderBtn').addEventListener('click', async () => {
        const pLoc = document.getElementById('pickupLoc').value;
        const dLoc = document.getElementById('deliveryLoc').value;
        await addDoc(collection(db, "pedidos"), {
            pickupLoc: pLoc, deliveryLoc: dLoc,
            valorTotal: window.tempPrice, status: 'pendente',
            clienteId: auth.currentUser.uid, data: serverTimestamp()
        });
    });

    window.acceptJob = async id => {
        const userDoc = await getDoc(doc(db, "usuarios", auth.currentUser.uid));
        await updateDoc(doc(db, "pedidos", id), { 
            status: 'aceito', 
            motoboyId: auth.currentUser.uid, 
            motoboyNome: userDoc.data().nome 
        });
    };

    window.finishJob = id => updateDoc(doc(db, "pedidos", id), { status: 'finalizado' });
    document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth).then(() => location.reload()));
</script>
</body>
</html>
