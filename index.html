<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoExpress - Premium</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.8);
            --primary-blue: #3b82f6;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --input-bg: #1e293b;
            --input-border: #334155;
        }

        body { background-color: var(--bg-dark); color: var(--text-main); font-family: 'Inter', sans-serif; margin: 0; }

        .form-control, .form-select {
            background-color: var(--input-bg) !important;
            border: 1px solid var(--input-border) !important;
            color: #ffffff !important; 
            padding: 12px;
            border-radius: 10px;
        }

        .form-control::placeholder { color: var(--text-dim) !important; }

        .glass-card { 
            background: var(--card-bg); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 24px; 
            padding: 1.5rem; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .btn-primary-custom { 
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); 
            border: none; padding: 14px; font-weight: bold; border-radius: 12px; 
            width: 100%; color: white !important; transition: 0.3s;
        }

        .pedido-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 5px solid var(--primary-blue);
        }

        .chat-box {
            background: rgba(15, 23, 42, 0.9);
            border-radius: 15px;
            height: 200px;
            overflow-y: auto;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid var(--input-border);
        }

        .msg { margin-bottom: 8px; padding: 6px 12px; border-radius: 10px; max-width: 80%; font-size: 0.9rem; }
        .msg-me { background: var(--primary-blue); margin-left: auto; color: white; }
        .msg-other { background: var(--input-bg); color: var(--text-main); }

        .history-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .nav-pills .nav-link { color: var(--text-dim); border-radius: 10px; }
        .nav-pills .nav-link.active { background-color: var(--primary-blue); color: white; }

        #map { height: 250px; width: 100%; border-radius: 15px; margin-top: 15px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="authSection" class="container py-5">
    <div class="glass-card mx-auto" style="max-width: 400px;">
        <h2 class="fw-bold text-primary text-center mb-4">MotoExpress</h2>
        
        <div id="formCadastro">
            <input type="text" id="regNome" class="form-control mb-2" placeholder="Nome Completo">
            <input type="email" id="regEmail" class="form-control mb-2" placeholder="E-mail">
            <input type="password" id="regSenha" class="form-control mb-2" placeholder="Senha">
            <select id="regTipo" class="form-select mb-3">
                <option value="cliente">👤 Sou Cliente</option>
                <option value="motoboy">🏍️ Sou Motoboy</option>
            </select>
            <button id="btnRegistrar" class="btn-primary-custom mb-3">CADASTRAR</button>
            <p class="text-center small text-dim">Já tem conta? <a href="#" onclick="toggleAuth()" class="text-primary fw-bold text-decoration-none">Entrar</a></p>
        </div>

        <div id="formLogin" class="hidden">
            <input type="email" id="loginEmail" class="form-control mb-2" placeholder="E-mail">
            <input type="password" id="loginSenha" class="form-control mb-3" placeholder="Senha">
            <button id="btnLoginAction" class="btn-primary-custom mb-3">ENTRAR</button>
            <p class="text-center small mb-2"><a href="#" id="btnResetSenha" class="text-dim text-decoration-none small">Esqueceu a senha?</a></p>
            <p class="text-center small text-dim">Novo? <a href="#" onclick="toggleAuth()" class="text-primary fw-bold text-decoration-none">Criar conta</a></p>
        </div>
    </div>
</div>

<div id="mainApp" class="container py-4" style="display:none;">
    <header class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold text-primary m-0">MotoExpress</h4>
        <button id="btnLogout" class="btn btn-sm btn-outline-danger">Sair</button>
    </header>

    <div id="areaCliente" class="col-12 col-md-6 mx-auto hidden">
        <ul class="nav nav-pills nav-justified mb-4 bg-dark p-1 rounded-3">
            <li class="nav-item"><a class="nav-link active" id="tabPedido" href="#" onclick="showClientSection('novo')">Solicitar</a></li>
            <li class="nav-item"><a class="nav-link" id="tabHistorico" href="#" onclick="showClientSection('historico')">Histórico</a></li>
        </ul>

        <div id="secNovoPedido">
            <div class="glass-card mb-4">
                <input type="text" id="origem" class="form-control mb-2" placeholder="Endereço de Coleta">
                <input type="text" id="destino" class="form-control mb-3" placeholder="Endereço de Entrega">
                <button id="btnSolicitar" class="btn-primary-custom">CHAMAR MOTOBOY</button>
            </div>
            <div id="statusPedidoCliente"></div>
            <div id="chatCliente" class="glass-card mb-4 hidden">
                <h6 class="text-primary">Chat com Motoboy</h6>
                <div id="boxChatCliente" class="chat-box"></div>
                <div class="input-group">
                    <input type="text" id="inputChatCliente" class="form-control" placeholder="Mensagem...">
                    <button class="btn btn-primary" onclick="enviarMensagem('cliente')"><i class="bi bi-send"></i></button>
                </div>
            </div>
            <div id="mapContainer" class="hidden"><div id="map"></div></div>
        </div>

        <div id="secHistorico" class="hidden">
            <div class="glass-card">
                <h5 class="text-primary mb-3">Minhas Entregas</h5>
                <div id="listaHistorico"></div>
            </div>
        </div>
    </div>

    <div id="areaMotoboy" class="col-12 col-md-8 mx-auto hidden">
        <div id="minhaCorridaAtiva"></div>
        <div id="chatMotoboy" class="glass-card mb-4 hidden">
            <h6 class="text-primary">Chat com Cliente</h6>
            <div id="boxChatMotoboy" class="chat-box"></div>
            <div class="input-group">
                <input type="text" id="inputChatMotoboy" class="form-control" placeholder="Mensagem...">
                <button class="btn btn-primary" onclick="enviarMensagem('motoboy')"><i class="bi bi-send"></i></button>
            </div>
        </div>
        <h5 class="text-warning mb-3">Pedidos Disponíveis</h5>
        <div id="listaPedidos"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, addDoc, query, where, onSnapshot, updateDoc, serverTimestamp, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBsnN_KrorIrJD3faVOxqFD3SfUILr7XUY",
        authDomain: "motoexpress-887ba.firebaseapp.com",
        projectId: "motoexpress-887ba",
        storageBucket: "motoexpress-887ba.appspot.com",
        messagingSenderId: "931221356023",
        appId: "1:931221356023:web:7f6f5e4d3c2b1a"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let map, marker, mapaCentralizado = false, pedidoAtivoId = null;
    let ultimoStatusNotificado = {};

    // Solicita permissão de notificação ao iniciar
    if ("Notification" in window) {
        Notification.requestPermission();
    }

    function enviarNotificacaoPush(titulo, corpo) {
        if (Notification.permission === "granted") {
            new Notification(titulo, { body: corpo, icon: "https://cdn-icons-png.flaticon.com/512/717/717434.png" });
        }
    }

    window.showClientSection = (sec) => {
        const isNovo = sec === 'novo';
        document.getElementById('secNovoPedido').classList.toggle('hidden', !isNovo);
        document.getElementById('secHistorico').classList.toggle('hidden', isNovo);
        document.getElementById('tabPedido').classList.toggle('active', isNovo);
        document.getElementById('tabHistorico').classList.toggle('active', !isNovo);
        if(!isNovo) carregarHistorico();
    };

    function monitorarPedidosCliente(uid) {
        onSnapshot(query(collection(db, "pedidos"), where("clienteId", "==", uid)), async snap => {
            const container = document.getElementById('statusPedidoCliente');
            container.innerHTML = "";
            let temAtiva = false;

            for (const d of snap.docs) {
                const p = d.data();
                if(p.status !== 'finalizado') {
                    // Notificar mudança para 'aceito'
                    if (p.status === 'aceito' && ultimoStatusNotificado[d.id] !== 'aceito') {
                        enviarNotificacaoPush("MotoExpress", "Seu pedido foi aceito pelo motoboy!");
                        ultimoStatusNotificado[d.id] = 'aceito';
                    }

                    let badge = "";
                    let msg = "";

                    if(p.status === 'pendente') {
                        badge = `<span class="badge bg-warning text-dark mb-2">Aguardando</span>`;
                        msg = `🔎 <b>Procurando por um motoboy...</b>`;
                        document.getElementById('chatCliente').classList.add('hidden');
                    } else if(p.status === 'aceito') {
                        temAtiva = true;
                        pedidoAtivoId = d.id;
                        badge = `<span class="badge bg-success mb-2">Aceito</span>`;
                        const mDoc = await getDoc(doc(db, "usuarios", p.motoboyId));
                        msg = `🏍️ O motoboy <b>${mDoc.data().nome}</b> está a caminho!`;
                        carregarMapa(p.motoboyId);
                        document.getElementById('mapContainer').classList.remove('hidden');
                        document.getElementById('chatCliente').classList.remove('hidden');
                        monitorarChat(d.id, 'boxChatCliente');
                    }
                    container.innerHTML += `<div class="pedido-card">${badge}<br>${msg}<br><small class="text-dim">${p.origem} → ${p.destino}</small></div>`;
                }
            }
            if(!temAtiva) {
                document.getElementById('mapContainer').classList.add('hidden');
                document.getElementById('chatCliente').classList.add('hidden');
            }
        });
    }

    function monitorarChat(idPedido, boxId) {
        const qChat = query(collection(db, "pedidos", idPedido, "chat"), orderBy("data", "asc"));
        let primeiraCarga = true;
        onSnapshot(qChat, snap => {
            const box = document.getElementById(boxId);
            box.innerHTML = "";
            snap.forEach(m => {
                const data = m.data();
                const isMe = data.senderId === auth.currentUser.uid;
                box.innerHTML += `<div class="msg ${isMe ? 'msg-me' : 'msg-other'}">${data.texto}</div>`;
                
                // Notificar nova mensagem se não for minha e não for a carga inicial
                if (!isMe && !primeiraCarga && m.metadata.hasPendingWrites === false) {
                    enviarNotificacaoPush("Nova Mensagem", data.texto);
                }
            });
            primeiraCarga = false;
            box.scrollTop = box.scrollHeight;
        });
    }

    window.enviarMensagem = async (tipo) => {
        const inputId = tipo === 'cliente' ? 'inputChatCliente' : 'inputChatMotoboy';
        const texto = document.getElementById(inputId).value;
        if(texto && pedidoAtivoId) {
            await addDoc(collection(db, "pedidos", pedidoAtivoId, "chat"), {
                texto: texto,
                senderId: auth.currentUser.uid,
                data: serverTimestamp()
            });
            document.getElementById(inputId).value = "";
        }
    };

    function carregarHistorico() {
        const q = query(collection(db, "pedidos"), where("clienteId", "==", auth.currentUser.uid), where("status", "==", "finalizado"), orderBy("data", "desc"));
        onSnapshot(q, snap => {
            const list = document.getElementById('listaHistorico');
            list.innerHTML = snap.empty ? "<p class='text-dim text-center'>Sem histórico.</p>" : "";
            snap.forEach(d => {
                const p = d.data();
                let dataFormatada = "Agora";
                if(p.data) {
                    const date = p.data.toDate();
                    dataFormatada = `${date.toLocaleDateString('pt-BR')} às ${date.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })}`;
                }
                list.innerHTML += `<div class="history-item"><div class="d-flex justify-content-between small mb-1"><span class="text-primary fw-bold">CONCLUÍDO</span><span>${dataFormatada}</span></div><div class="small"><b>Coleta:</b> ${p.origem}<br><b>Entrega:</b> ${p.destino}</div></div>`;
            });
        });
    }

    function iniciarFluxoMotoboy() {
        navigator.geolocation.watchPosition(p => {
            updateDoc(doc(db, "usuarios", auth.currentUser.uid), { lat: p.coords.latitude, lng: p.coords.longitude });
        }, null, {enableHighAccuracy: true});

        onSnapshot(query(collection(db, "pedidos"), where("status", "==", "pendente")), snap => {
            const l = document.getElementById('listaPedidos'); l.innerHTML = "";
            if (!snap.empty && ultimoStatusNotificado['novo_pedido'] !== snap.docs.length) {
                enviarNotificacaoPush("MotoExpress", "Há novos pedidos disponíveis!");
                ultimoStatusNotificado['novo_pedido'] = snap.docs.length;
            }
            snap.forEach(d => {
                const p = d.data();
                l.innerHTML += `<div class="pedido-card"><div class="mb-2"><b>📍 Coleta:</b> ${p.origem}<br><b>🏁 Entrega:</b> ${p.destino}</div><button class="btn btn-success btn-sm w-100" onclick="aceitar('${d.id}')">ACEITAR</button></div>`;
            });
        });

        onSnapshot(query(collection(db, "pedidos"), where("motoboyId", "==", auth.currentUser.uid), where("status", "==", "aceito")), snap => {
            const c = document.getElementById('minhaCorridaAtiva'); c.innerHTML = "";
            const chatM = document.getElementById('chatMotoboy');
            if(snap.empty) { chatM.classList.add('hidden'); }
            snap.forEach(d => {
                pedidoAtivoId = d.id;
                chatM.classList.remove('hidden');
                monitorarChat(d.id, 'boxChatMotoboy');
                c.innerHTML = `<div class="glass-card mb-4 border-success"><h6>Corrida Ativa</h6><button class="btn btn-success w-100" onclick="finalizar('${d.id}')">FINALIZAR</button></div>`;
            });
        });
    }

    function carregarMapa(mid) {
        if (!map) {
            map = L.map('map').setView([-15, -47], 4);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            marker = L.marker([0, 0]).addTo(map);
        }
        onSnapshot(doc(db, "usuarios", mid), d => {
            const pos = [d.data().lat, d.data().lng];
            marker.setLatLng(pos);
            if(!mapaCentralizado) { map.setView(pos, 16); mapaCentralizado = true; } else map.panTo(pos);
        });
    }

    onAuthStateChanged(auth, async u => {
        if(u) {
            const uDoc = await getDoc(doc(db, "usuarios", u.uid));
            if(uDoc.exists()) {
                const uData = uDoc.data();
                document.getElementById('authSection').classList.add('hidden');
                document.getElementById('mainApp').style.display = 'block';
                if(uData.tipo === 'cliente') { document.getElementById('areaCliente').classList.remove('hidden'); monitorarPedidosCliente(u.uid); }
                else { document.getElementById('areaMotoboy').classList.remove('hidden'); iniciarFluxoMotoboy(); }
            }
        } else {
            document.getElementById('authSection').classList.remove('hidden');
            document.getElementById('mainApp').style.display = 'none';
        }
    });

    document.getElementById('btnSolicitar').addEventListener('click', async () => {
        const o = document.getElementById('origem').value, d = document.getElementById('destino').value;
        if(o && d) {
            await addDoc(collection(db, "pedidos"), { origem: o, destino: d, status: "pendente", clienteId: auth.currentUser.uid, data: serverTimestamp() });
            document.getElementById('origem').value = ""; document.getElementById('destino').value = "";
        }
    });

    window.aceitar = id => updateDoc(doc(db, "pedidos", id), { status: "aceito", motoboyId: auth.currentUser.uid });
    window.finalizar = id => confirm("Finalizar?") && updateDoc(doc(db, "pedidos", id), { status: "finalizado" });
    window.toggleAuth = () => { document.getElementById('formCadastro').classList.toggle('hidden'); document.getElementById('formLogin').classList.toggle('hidden'); };
    
    document.getElementById('btnRegistrar').addEventListener('click', async () => {
        try {
            const cred = await createUserWithEmailAndPassword(auth, document.getElementById('regEmail').value, document.getElementById('regSenha').value);
            await setDoc(doc(db, "usuarios", cred.user.uid), { nome: document.getElementById('regNome').value, email: document.getElementById('regEmail').value, tipo: document.getElementById('regTipo').value, lat: 0, lng: 0 });
        } catch (e) { alert("Erro: " + e.message); }
    });

    document.getElementById('btnLoginAction').addEventListener('click', async () => {
        try { await signInWithEmailAndPassword(auth, document.getElementById('loginEmail').value, document.getElementById('loginSenha').value); } 
        catch (e) { alert("Usuário ou senha incorreto."); }
    });

    document.getElementById('btnResetSenha').addEventListener('click', async () => {
        const email = document.getElementById('loginEmail').value;
        if (!email) return alert("Digite seu e-mail no campo acima.");
        try { await sendPasswordResetEmail(auth, email); alert("E-mail enviado!"); } catch (e) { alert("Erro: " + e.message); }
    });

    document.getElementById('btnLogout').addEventListener('click', () => signOut(auth));
</script>
</body>
</html>
