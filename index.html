<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoExpress - Premium</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.8);
            --primary-blue: #3b82f6;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body { background-color: var(--bg-dark); color: var(--text-main); font-family: 'Inter', sans-serif; }
        .glass-card { background: var(--card-bg); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 1.5rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        
        .form-control, .form-select { background-color: #1e293b !important; border: 1px solid #334155 !important; color: #ffffff !important; padding: 12px; }
        .btn-primary-custom { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); border: none; padding: 14px; font-weight: bold; border-radius: 12px; width: 100%; color: white !important; }

        .pedido-card { background: rgba(255, 255, 255, 0.05); border-radius: 15px; padding: 15px; margin-bottom: 15px; border-left: 5px solid var(--primary-blue); }
        .history-item { background: rgba(255, 255, 255, 0.03); border-radius: 12px; padding: 12px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05); }

        .nav-pills .nav-link { color: var(--text-dim); border-radius: 10px; }
        .nav-pills .nav-link.active { background-color: var(--primary-blue); color: white; }

        #map { height: 300px; width: 100%; border-radius: 15px; margin-top: 15px; }
        .hidden { display: none !important; }
        
        /* Estilo para o Autocomplete */
        .autocomplete-suggestions { background: #1e293b; border: 1px solid #3b82f6; border-radius: 8px; max-height: 200px; overflow-y: auto; position: absolute; z-index: 9999; width: 100%; }
        .suggestion-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #334155; font-size: 0.8rem; }
        .suggestion-item:hover { background: #334155; }
    </style>
</head>
<body>

<div id="authSection" class="container py-5">
    <div class="glass-card mx-auto" style="max-width: 400px;">
        <h2 class="fw-bold text-primary text-center mb-4">MotoExpress</h2>
        <div id="formCadastro">
            <input type="text" id="regNome" class="form-control mb-2" placeholder="Nome Completo">
            <input type="email" id="regEmail" class="form-control mb-2" placeholder="E-mail">
            <input type="password" id="regSenha" class="form-control mb-2" placeholder="Senha">
            <select id="regTipo" class="form-select mb-3">
                <option value="cliente">Sou Cliente</option>
                <option value="motoboy">Sou Motoboy</option>
            </select>
            <button id="btnRegistrar" class="btn-primary-custom mb-3">CADASTRAR</button>
            <p class="text-center small text-dim">Já tem conta? <a href="#" onclick="toggleAuth()" class="text-primary">Entrar</a></p>
        </div>
        <div id="formLogin" class="hidden">
            <input type="email" id="loginEmail" class="form-control mb-2" placeholder="E-mail">
            <input type="password" id="loginSenha" class="form-control mb-3" placeholder="Senha">
            <button id="btnLoginAction" class="btn-primary-custom mb-3">ENTRAR</button>
            <p class="text-center small text-dim">Novo? <a href="#" onclick="toggleAuth()" class="text-primary">Criar conta</a></p>
        </div>
    </div>
</div>

<div id="mainApp" class="container py-4" style="display:none;">
    <header class="d-flex justify-content-between mb-4">
        <h4 class="fw-bold text-primary m-0">MotoExpress</h4>
        <button id="btnLogout" class="btn btn-sm btn-outline-danger">Sair</button>
    </header>

    <div id="areaCliente" class="col-12 col-md-6 mx-auto hidden">
        <ul class="nav nav-pills nav-justified mb-4 bg-dark p-1 rounded-3">
            <li class="nav-item"><a class="nav-link active" id="tabPedido" href="#" onclick="showClientSection('novo')">Novo</a></li>
            <li class="nav-item"><a class="nav-link" id="tabHistorico" href="#" onclick="showClientSection('historico')">Histórico</a></li>
        </ul>

        <div id="secNovoPedido">
            <div class="glass-card mb-4">
                <div class="position-relative mb-2">
                    <input type="text" id="origem" class="form-control" placeholder="Origem" autocomplete="off">
                    <div id="sugestoesOrigem" class="autocomplete-suggestions hidden"></div>
                </div>
                <div class="position-relative mb-3">
                    <input type="text" id="destino" class="form-control" placeholder="Destino" autocomplete="off">
                    <div id="sugestoesDestino" class="autocomplete-suggestions hidden"></div>
                </div>
                <button id="btnSolicitar" class="btn-primary-custom">CHAMAR AGORA</button>
            </div>
            <div id="statusPedidoCliente"></div>
            <div id="mapContainer" class="hidden"><div id="map"></div></div>
        </div>

        <div id="secHistorico" class="hidden">
            <div class="glass-card">
                <h5 class="text-primary mb-3">Minhas Corridas</h5>
                <div id="listaHistorico"></div>
            </div>
        </div>
    </div>

    <div id="areaMotoboy" class="col-12 col-md-8 mx-auto hidden">
        <div id="minhaCorridaAtiva"></div>
        <h5 class="text-warning mb-3">Pedidos na Mesa</h5>
        <div id="listaPedidos"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, addDoc, query, where, onSnapshot, updateDoc, serverTimestamp, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBsnN_KrorIrJD3faVOxqFD3SfUILr7XUY",
        authDomain: "motoexpress-887ba.firebaseapp.com",
        projectId: "motoexpress-887ba",
        storageBucket: "motoexpress-887ba.appspot.com",
        messagingSenderId: "931221356023",
        appId: "1:931221356023:web:7f6f5e4d3c2b1a"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let map, marker, watchID, mapaCentralizado = false;

    // --- NAVEGAÇÃO ---
    window.showClientSection = (sec) => {
        const isNovo = sec === 'novo';
        document.getElementById('secNovoPedido').classList.toggle('hidden', !isNovo);
        document.getElementById('secHistorico').classList.toggle('hidden', isNovo);
        document.getElementById('tabPedido').classList.toggle('active', isNovo);
        document.getElementById('tabHistorico').classList.toggle('active', !isNovo);
        if(!isNovo) carregarHistorico();
    };

    // --- CLIENTE: MONITORAR E HISTÓRICO ---
    function monitorarPedidosCliente(uid) {
        onSnapshot(query(collection(db, "pedidos"), where("clienteId", "==", uid)), async snap => {
            const container = document.getElementById('statusPedidoCliente');
            container.innerHTML = "";
            let temAtiva = false;

            for (const d of snap.docs) {
                const p = d.data();
                if(p.status !== 'finalizado') {
                    let msg = p.status === 'pendente' ? "🔎 Procurando motoboy..." : "🏍️ Motoboy a caminho!";
                    if(p.status === 'aceito') {
                        temAtiva = true;
                        const mDoc = await getDoc(doc(db, "usuarios", p.motoboyId));
                        msg = `🏍️ <b>${mDoc.data().nome}</b> aceitou seu pedido!`;
                        carregarMapa(p.motoboyId);
                        document.getElementById('mapContainer').classList.remove('hidden');
                    }
                    container.innerHTML += `<div class="pedido-card">${msg}<br><small class="text-dim">${p.origem} → ${p.destino}</small></div>`;
                }
            }
            if(!temAtiva) document.getElementById('mapContainer').classList.add('hidden');
        });
    }

    function carregarHistorico() {
        const q = query(collection(db, "pedidos"), where("clienteId", "==", auth.currentUser.uid), where("status", "==", "finalizado"), orderBy("data", "desc"));
        onSnapshot(q, snap => {
            const list = document.getElementById('listaHistorico');
            list.innerHTML = snap.empty ? "<p class='text-dim text-center'>Sem histórico.</p>" : "";
            snap.forEach(d => {
                const p = d.data();
                const dataStr = p.data ? p.data.toDate().toLocaleDateString('pt-BR') : "Agora";
                list.innerHTML += `
                    <div class="history-item">
                        <div class="d-flex justify-content-between small mb-1"><span class="text-primary fw-bold">CONCLUÍDO</span><span>${dataStr}</span></div>
                        <div class="small"><b>De:</b> ${p.origem}</div>
                        <div class="small"><b>Para:</b> ${p.destino}</div>
                    </div>`;
            });
        });
    }

    // --- MOTOBOY: LISTA E RASTREIO ---
    function iniciarFluxoMotoboy() {
        watchID = navigator.geolocation.watchPosition(p => {
            updateDoc(doc(db, "usuarios", auth.currentUser.uid), { lat: p.coords.latitude, lng: p.coords.longitude });
        }, null, {enableHighAccuracy: true});

        onSnapshot(query(collection(db, "pedidos"), where("status", "==", "pendente")), snap => {
            const l = document.getElementById('listaPedidos');
            l.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                l.innerHTML += `
                    <div class="pedido-card">
                        <div class="mb-2"><b>📍 Coleta:</b> ${p.origem}<br><b>🏁 Entrega:</b> ${p.destino}</div>
                        <button class="btn btn-success btn-sm w-100" onclick="aceitar('${d.id}')">ACEITAR CORRIDA</button>
                    </div>`;
            });
        });

        onSnapshot(query(collection(db, "pedidos"), where("motoboyId", "==", auth.currentUser.uid), where("status", "==", "aceito")), snap => {
            const c = document.getElementById('minhaCorridaAtiva');
            c.innerHTML = "";
            snap.forEach(d => {
                c.innerHTML = `<div class="glass-card mb-4 border-success"><h6>Entrega Ativa</h6><p class="small">${d.data().destino}</p><button class="btn btn-success w-100" onclick="finalizar('${d.id}')">FINALIZAR ENTREGA</button></div>`;
            });
        });
    }

    // --- MAPA ---
    function carregarMapa(mid) {
        if (!map) {
            map = L.map('map').setView([-15, -47], 4);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            marker = L.marker([0, 0]).addTo(map);
        }
        onSnapshot(doc(db, "usuarios", mid), d => {
            const pos = [d.data().lat, d.data().lng];
            marker.setLatLng(pos);
            if(!mapaCentralizado) { map.setView(pos, 16); mapaCentralizado = true; } else map.panTo(pos);
        });
    }

    // --- AUTH E SOLICITAÇÃO ---
    onAuthStateChanged(auth, async u => {
        if(u) {
            const uData = (await getDoc(doc(db, "usuarios", u.uid))).data();
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('mainApp').style.display = 'block';
            if(uData.tipo === 'cliente') { document.getElementById('areaCliente').classList.remove('hidden'); monitorarPedidosCliente(u.uid); }
            else { document.getElementById('areaMotoboy').classList.remove('hidden'); iniciarFluxoMotoboy(); }
        } else {
            document.getElementById('authSection').classList.remove('hidden');
            document.getElementById('mainApp').style.display = 'none';
        }
    });

    document.getElementById('btnSolicitar').addEventListener('click', async () => {
        const o = document.getElementById('origem').value;
        const d = document.getElementById('destino').value;
        if(o && d) {
            await addDoc(collection(db, "pedidos"), { origem: o, destino: d, status: "pendente", clienteId: auth.currentUser.uid, data: serverTimestamp() });
            document.getElementById('origem').value = ""; document.getElementById('destino').value = "";
        }
    });

    // Funções Globais para botões dinâmicos
    window.aceitar = id => updateDoc(doc(db, "pedidos", id), { status: "aceito", motoboyId: auth.currentUser.uid });
    window.finalizar = id => confirm("Confirmar entrega?") && updateDoc(doc(db, "pedidos", id), { status: "finalizado" });
    window.toggleAuth = () => { document.getElementById('formCadastro').classList.toggle('hidden'); document.getElementById('formLogin').classList.toggle('hidden'); };
    document.getElementById('btnRegistrar').addEventListener('click', async () => {
        const cred = await createUserWithEmailAndPassword(auth, document.getElementById('regEmail').value, document.getElementById('regSenha').value);
        await setDoc(doc(db, "usuarios", cred.user.uid), { nome: document.getElementById('regNome').value, email: document.getElementById('regEmail').value, tipo: document.getElementById('regTipo').value });
    });
    document.getElementById('btnLoginAction').addEventListener('click', () => signInWithEmailAndPassword(auth, document.getElementById('loginEmail').value, document.getElementById('loginSenha').value));
    document.getElementById('btnLogout').addEventListener('click', () => signOut(auth));
</script>
</body>
</html>
