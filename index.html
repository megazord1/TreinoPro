<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoExpress - Premium</title>
    <!-- Bootstrap & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Leaflet & Geocoder -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.8);
            --primary-blue: #3b82f6;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body { 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            margin: 0;
        }

        .auth-container { display: flex; align-items: center; justify-content: center; min-height: 100vh; }

        .glass-card { 
            background: var(--card-bg); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 24px; 
            padding: 2rem; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Cores dos campos de input - Mantendo sua preferência */
        .form-control, .form-select {
            background-color: #1e293b !important;
            border: 1px solid #334155 !important;
            color: #ffffff !important; 
            padding: 12px;
        }

        .form-control::placeholder { color: #94a3b8 !important; }

        .btn-primary-custom { 
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); 
            border: none; padding: 14px; font-weight: bold; border-radius: 12px; 
            width: 100%; color: white !important; transition: 0.3s;
        }

        .autocomplete-suggestions {
            background: #1e293b;
            border: 1px solid #3b82f6;
            border-radius: 8px;
            max-height: 200px;
            overflow-y: auto;
            position: absolute;
            z-index: 9999;
            width: 100%;
            top: 55px;
        }

        .suggestion-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #334155; font-size: 0.8rem; }
        .suggestion-item:hover { background: #334155; }

        .pedido-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 5px solid var(--primary-blue);
        }

        .history-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .nav-pills .nav-link { color: var(--text-dim); border-radius: 10px; }
        .nav-pills .nav-link.active { background-color: var(--primary-blue); }

        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; margin-bottom: 8px; }
        .bg-pendente { background: #ca8a04; }
        .bg-aceito { background: #16a34a; }
        .bg-finalizado { background: #475569; }

        #map { height: 300px; width: 100%; border-radius: 15px; margin-top: 15px; }
        .hidden { display: none !important; }
        .cursor-pointer { cursor: pointer; }
    </style>
</head>
<body>

<div id="authSection" class="container auth-container">
    <div class="glass-card w-100" style="max-width: 400px;">
        <h2 class="fw-bold text-primary text-center mb-2">Moto<span class="text-white">Express</span></h2>
        
        <div id="formCadastro">
            <h5 class="text-center mb-3 text-dim">Criar Conta</h5>
            <input type="text" id="regNome" class="form-control mb-2" placeholder="Nome Completo">
            <input type="email" id="regEmail" class="form-control mb-2" placeholder="E-mail">
            <input type="password" id="regSenha" class="form-control mb-2" placeholder="Senha (6+ dígitos)">
            <select id="regTipo" class="form-select mb-4">
                <option value="cliente">👤 Sou Cliente</option>
                <option value="motoboy">🏍️ Sou Motoboy</option>
            </select>
            <button id="btnRegistrar" class="btn-primary-custom mb-3">CADASTRAR</button>
            <p class="text-center small text-dim">Já tem conta? <span class="text-primary cursor-pointer fw-bold" onclick="toggleAuth()">Entrar aqui</span></p>
        </div>

        <div id="formLogin" class="hidden">
            <h5 class="text-center mb-3 text-dim">Acessar Sistema</h5>
            <input type="email" id="loginEmail" class="form-control mb-2" placeholder="Seu E-mail">
            <input type="password" id="loginSenha" class="form-control mb-4" placeholder="Sua Senha">
            <button id="btnLoginAction" class="btn-primary-custom mb-3">ENTRAR</button>
            <p class="text-center small text-dim">Novo por aqui? <span class="text-primary cursor-pointer fw-bold" onclick="toggleAuth()">Criar conta</span></p>
        </div>
    </div>
</div>

<div id="mainApp" class="container py-4" style="display:none;">
    <header class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h3 class="fw-bold text-primary m-0">Moto<span class="text-white">Express</span></h3>
            <p id="boasVindas" class="small text-dim m-0"></p>
        </div>
        <button id="btnLogout" class="btn btn-sm btn-outline-danger">Sair</button>
    </header>

    <!-- ÁREA DO CLIENTE -->
    <div id="areaCliente" class="col-12 col-md-6 mx-auto hidden">
        <ul class="nav nav-pills nav-justified mb-4 bg-dark p-1 rounded-3">
            <li class="nav-item">
                <a class="nav-link active" id="tabPedido" href="#" onclick="showClientSection('novo')">Novo Pedido</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" id="tabHistorico" href="#" onclick="showClientSection('historico')">Meu Histórico</a>
            </li>
        </ul>

        <div id="secNovoPedido">
            <div class="glass-card mb-4">
                <h5 class="mb-3 text-primary"><i class="bi bi-plus-circle me-2"></i>Solicitar Entrega</h5>
                <div class="position-relative mb-3">
                    <input type="text" id="origem" class="form-control" placeholder="Endereço de Coleta" autocomplete="off">
                    <div id="sugestoesOrigem" class="autocomplete-suggestions hidden"></div>
                </div>
                <div class="position-relative mb-3">
                    <input type="text" id="destino" class="form-control" placeholder="Endereço de Entrega" autocomplete="off">
                    <div id="sugestoesDestino" class="autocomplete-suggestions hidden"></div>
                </div>
                <button id="btnSolicitar" class="btn-primary-custom">CHAMAR AGORA</button>
            </div>
            
            <h6 class="text-dim mb-3">Pedidos Ativos:</h6>
            <div id="statusPedidoCliente"></div>
            <div id="mapContainer" class="hidden">
                <div id="map"></div>
            </div>
        </div>

        <div id="secHistorico" class="hidden">
            <div class="glass-card">
                <h5 class="mb-4 text-primary"><i class="bi bi-clock-history me-2"></i>Últimas Corridas</h5>
                <div id="listaHistorico"></div>
            </div>
        </div>
    </div>

    <!-- ÁREA DO MOTOBOY -->
    <div id="areaMotoboy" class="col-12 col-md-8 mx-auto hidden">
        <div id="minhaCorridaAtiva"></div>
        <h5 class="mb-3 text-warning">Pedidos Disponíveis</h5>
        <div id="listaPedidos"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, addDoc, query, where, onSnapshot, updateDoc, serverTimestamp, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBsnN_KrorIrJD3faVOxqFD3SfUILr7XUY",
        authDomain: "motoexpress-887ba.firebaseapp.com",
        projectId: "motoexpress-887ba",
        storageBucket: "motoexpress-887ba.appspot.com",
        messagingSenderId: "931221356023",
        appId: "1:931221356023:web:7f6f5e4d3c2b1a"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const geocoder = L.Control.Geocoder.nominatim({ geocodingQueryParams: { countrycodes: 'br' } });
    let map, marker, watchID, mapaCentralizado = false;

    // Navegação Interna Cliente
    window.showClientSection = (sec) => {
        if(sec === 'novo') {
            document.getElementById('secNovoPedido').classList.remove('hidden');
            document.getElementById('secHistorico').classList.add('hidden');
            document.getElementById('tabPedido').classList.add('active');
            document.getElementById('tabHistorico').classList.remove('active');
        } else {
            document.getElementById('secNovoPedido').classList.add('hidden');
            document.getElementById('secHistorico').classList.remove('remove');
            document.getElementById('secHistorico').classList.remove('hidden');
            document.getElementById('tabPedido').classList.remove('active');
            document.getElementById('tabHistorico').classList.add('active');
            carregarHistorico();
        }
    };

    // Autocomplete
    function setupAutocomplete(inputId, suggestionsId) {
        const input = document.getElementById(inputId);
        const divSugestoes = document.getElementById(suggestionsId);
        input.addEventListener('input', (e) => {
            if (e.target.value.length < 4) { divSugestoes.classList.add('hidden'); return; }
            geocoder.geocode(e.target.value, (results) => {
                divSugestoes.innerHTML = "";
                if (results.length > 0) {
                    divSugestoes.classList.remove('hidden');
                    results.forEach(res => {
                        const item = document.createElement('div');
                        item.className = "suggestion-item";
                        item.innerText = res.name;
                        item.onclick = () => { input.value = res.name; divSugestoes.classList.add('hidden'); };
                        divSugestoes.appendChild(item);
                    });
                }
            });
        });
    }
    setupAutocomplete('origem', 'sugestoesOrigem');
    setupAutocomplete('destino', 'sugestoesDestino');

    // Monitorar Pedidos do Cliente (Ativos e Nome do Motoboy)
    function monitorarPedidosCliente(clienteId) {
        onSnapshot(query(collection(db, "pedidos"), where("clienteId", "==", clienteId)), async (snap) => {
            const container = document.getElementById('statusPedidoCliente');
            container.innerHTML = "";
            let temEntregaAtiva = false;

            for (const docSnap of snap.docs) {
                const p = docSnap.data();
                if(p.status !== 'finalizado') {
                    let infoExtra = p.status === 'pendente' ? "🔎 <b>Procurando por um motoboy...</b>" : "";
                    let badge = `<span class="status-badge bg-pendente">Aguardando</span>`;
                    
                    if(p.status === 'aceito') {
                        temEntregaAtiva = true;
                        badge = `<span class="status-badge bg-aceito">Em andamento</span>`;
                        const mDoc = await getDoc(doc(db, "usuarios", p.motoboyId));
                        infoExtra = `🏍️ O motoboy <b>${mDoc.data().nome}</b> está a caminho!`;
                        carregarMapa(p.motoboyId);
                        document.getElementById('mapContainer').classList.remove('hidden');
                    }
                    
                    container.innerHTML += `
                        <div class="pedido-card">
                            ${badge}<br>${infoExtra}
                            <div class="small text-dim mt-2">${p.origem} → ${p.destino}</div>
                        </div>`;
                }
            }
            if(!temEntregaAtiva) document.getElementById('mapContainer').classList.add('hidden');
        });
    }

    // Carregar Histórico
    async function carregarHistorico() {
        const q = query(collection(db, "pedidos"), where("clienteId", "==", auth.currentUser.uid), where("status", "==", "finalizado"), orderBy("data", "desc"));
        const snap = await getDoc(q); // Usando getDoc para uma carga estática
        const container = document.getElementById('listaHistorico');
        container.innerHTML = "";

        onSnapshot(q, (snapshot) => {
            container.innerHTML = snapshot.empty ? "<p class='text-center text-dim'>Nenhuma corrida finalizada.</p>" : "";
            snapshot.forEach(d => {
                const p = d.data();
                const dataFormatada = p.data ? p.data.toDate().toLocaleDateString('pt-BR') : "---";
                container.innerHTML += `
                    <div class="history-item">
                        <div class="d-flex justify-content-between mb-1">
                            <span class="badge bg-finalizado">Concluído</span>
                            <small class="text-dim">${dataFormatada}</small>
                        </div>
                        <div class="small"><b>Origem:</b> ${p.origem}</div>
                        <div class="small"><b>Destino:</b> ${p.destino}</div>
                    </div>`;
            });
        });
    }

    // Mapa
    function carregarMapa(motoboyId) {
        if (!map) {
            map = L.map('map').setView([-15, -47], 4);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            marker = L.marker([0, 0]).addTo(map);
        }
        onSnapshot(doc(db, "usuarios", motoboyId), (d) => {
            if(d.data()?.lat) {
                const pos = [d.data().lat, d.data().lng];
                marker.setLatLng(pos);
                if(!mapaCentralizado) { map.setView(pos, 16); mapaCentralizado = true; } else map.panTo(pos);
            }
        });
    }

    // Auth
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const u = (await getDoc(doc(db, "usuarios", user.uid))).data();
            document.getElementById('boasVindas').innerText = `Olá, ${u.nome}!`;
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('mainApp').style.display = 'block';
            if(u.tipo === 'cliente') {
                document.getElementById('areaCliente').classList.remove('hidden');
                monitorarPedidosCliente(user.uid);
            } else {
                document.getElementById('areaMotoboy').classList.remove('hidden');
                iniciarFluxoMotoboy();
            }
        } else {
            document.getElementById('authSection').classList.remove('hidden');
            document.getElementById('mainApp').style.display = 'none';
        }
    });

    // Ações Motoboy
    function iniciarFluxoMotoboy() {
        watchID = navigator.geolocation.watchPosition(p => {
            updateDoc(doc(db, "usuarios", auth.currentUser.uid), { lat: p.coords.latitude, lng: p.coords.longitude });
        }, null, {enableHighAccuracy: true});

        onSnapshot(query(collection(db, "pedidos"), where("status", "==", "pendente")), (snap) => {
            const l = document.getElementById('listaPedidos'); l.innerHTML = "";
            snap.forEach(d => {
                l.innerHTML += `<div class="pedido-card d-flex justify-content-between align-items-center">
                    <div class="small">${d.data().origem}</div>
                    <button class="btn btn-success btn-sm" onclick="aceitar('${d.id}')">ACEITAR</button>
                </div>`;
            });
        });

        onSnapshot(query(collection(db, "pedidos"), where("motoboyId", "==", auth.currentUser.uid), where("status", "==", "aceito")), snap => {
            const c = document.getElementById('minhaCorridaAtiva'); c.innerHTML = "";
            snap.forEach(d => {
                c.innerHTML = `<div class="glass-card mb-4 border-success"><h6>Entrega em curso</h6><button class="btn btn-success w-100" onclick="finalizar('${d.id}')">CONCLUIR</button></div>`;
            });
        });
    }

    // Eventos de Botão
    document.getElementById('btnSolicitar').addEventListener('click', async () => {
        const o = document.getElementById('origem').value;
        const d = document.getElementById('destino').value;
        if(o && d) await addDoc(collection(db, "pedidos"), { origem: o, destino: d, status: "pendente", clienteId: auth.currentUser.uid, data: serverTimestamp() });
        document.getElementById('origem').value = ""; document.getElementById('destino').value = "";
    });

    document.getElementById('btnRegistrar').addEventListener('click', async () => {
        try {
            const cred = await createUserWithEmailAndPassword(auth, document.getElementById('regEmail').value, document.getElementById('regSenha').value);
            await setDoc(doc(db, "usuarios", cred.user.uid), { nome: document.getElementById('regNome').value, email: document.getElementById('regEmail').value, tipo: document.getElementById('regTipo').value });
        } catch(e) { alert("Erro no cadastro"); }
    });

    document.getElementById('btnLoginAction').addEventListener('click', async () => {
        try { await signInWithEmailAndPassword(auth, document.getElementById('loginEmail').value, document.getElementById('loginSenha').value); }
        catch(e) { alert("Erro no login"); }
    });

    document.getElementById('btnLogout').addEventListener('click', () => signOut(auth));

    window.toggleAuth = () => { document.getElementById('formCadastro').classList.toggle('hidden'); document.getElementById('formLogin').classList.toggle('hidden'); };
    window.aceitar = (id) => updateDoc(doc(db, "pedidos", id), { status: "aceito", motoboyId: auth.currentUser.uid });
    window.finalizar = (id) => confirm("Concluir?") && updateDoc(doc(db, "pedidos", id), { status: "finalizado" });
</script>
</body>
</html>
